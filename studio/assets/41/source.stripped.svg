  <!-- gold squiggle under the title's first words -->
  <path d="M 96 966 Q 146 950 196 966 T 296 966 T 396 966" fill="none" stroke="#c8a24b" stroke-width="5" stroke-linecap="round"/>

  <!-- per-fact line icons, inline row -->
