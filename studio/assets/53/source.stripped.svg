  <image x="588" y="410" width="336" height="266" xlink:href="@@PHOTO2@@" preserveAspectRatio="xMidYMid slice"/>

  <rect x="64" y="866" width="64" height="3" fill="@@COLOUR:accent@@"/>
  <rect x="64" y="1252" width="952" height="1" fill="@@COLOUR:title@@" fill-opacity="0.4"/>

  <g stroke="@@COLOUR:icon@@" stroke-width="2.5" fill="none">
