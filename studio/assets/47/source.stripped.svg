<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- Template 47 "Vista" - CC-authored 2-photo (2026-07-15). The immersive professional: the hero IS the
       canvas (full bleed, edge to edge), a gradient anchors the facts on the photo itself, and the
       interior floats as a white-bordered inset card. Completely different architecture from the tier's
       panels and diptychs. Art colours live tokens; the gradient is shadow, not colour. -->
  <defs>
    <linearGradient id="anchorG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.34" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.56" stop-color="#0a0c10" stop-opacity="0.58"/>
      <stop offset="0.78" stop-color="#0a0c10" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0a0c10" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="topG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0c10" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- the hero IS the page -->
  <image x="0" y="0" width="1080" height="1350" xlink:href="@@PHOTO0@@" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="1080" height="150" fill="url(#topG)"/>
  <rect x="0" y="520" width="1080" height="830" fill="url(#anchorG)"/>

  <!-- the interior floats as a card -->
  <rect x="632" y="76" width="392" height="316" fill="@@COLOUR:badge.fill@@"/>
  <image x="644" y="88" width="368" height="292" xlink:href="@@PHOTO1@@" preserveAspectRatio="xMidYMid slice"/>

  <!-- anchor rules -->
  <rect x="64" y="866" width="64" height="3" fill="@@COLOUR:accent@@"/>
  <rect x="64" y="1252" width="952" height="1" fill="@@COLOUR:title@@" fill-opacity="0.4"/>

  <!-- per-fact line icons on the anchor -->
  <g stroke="@@COLOUR:icon@@" stroke-width="2.5" fill="none">
    <path d="M70 1092 L70 1068 L114 1068"/>
    <path d="M64 1096 L120 1096 L120 1084 A8 8 0 0 0 112 1076 L82 1076"/>
    <path d="M66 1096 L66 1104 M118 1096 L118 1104"/>
    <circle cx="75" cy="1073" r="4"/>
  </g>
  <g stroke="@@COLOUR:icon@@" stroke-width="2.5" fill="none">
    <path d="M240 1082 L284 1082 A4 4 0 0 1 288 1086 A16 16 0 0 1 272 1100 L252 1100 A16 16 0 0 1 236 1086 A4 4 0 0 1 240 1082 Z"/>
    <path d="M244 1082 L244 1068 A7 7 0 0 1 258 1068"/>
    <path d="M248 1100 L246 1106 M276 1100 L278 1106"/>
  </g>
  <g stroke="@@COLOUR:icon@@" stroke-width="2.5" fill="none">
    <rect x="404" y="1068" width="40" height="36" stroke-dasharray="6 4"/>
    <path d="M412 1096 L436 1076 M412 1084 L412 1096 L424 1096 M436 1088 L436 1076 L424 1076"/>
  </g>
</svg>