  <!-- Template 36 "La Ventana" — CC-authored 1-photo showcase (2026-07-15).
       THE IDEA: you are not looking at a listing, you are looking OUT OF THE HOUSE — the property is the
       view through a Mediterranean window: arched fanlight with radiating glazing bars, open louvred
       shutters, a whitewashed wall (engine-painted → recolourable), a geranium on the sill, and a cat
       who already lives there. All text engine-drawn (no_knockouts). -->
