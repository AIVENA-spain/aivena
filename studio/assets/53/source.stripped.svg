<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- Template 53 "Mirador" - CC-authored 3-photo (2026-07-15). The immersive for three photos: the hero
       IS the canvas; two interiors float as staggered white-bordered cards; the facts anchor on the
       gradient. Art colours live tokens; gradients are shadow. -->
  <defs>
    <linearGradient id="anchorG53" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.34" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.56" stop-color="#0a0c10" stop-opacity="0.58"/>
      <stop offset="0.78" stop-color="#0a0c10" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0a0c10" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="topG53" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0c10" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <image x="0" y="0" width="1080" height="1350" xlink:href="@@PHOTO0@@" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="1080" height="150" fill="url(#topG53)"/>
  <rect x="0" y="520" width="1080" height="830" fill="url(#anchorG53)"/>

  <!-- two interiors, staggered cards -->
  <rect x="664" y="76" width="360" height="290" fill="@@COLOUR:badge.fill@@"/>
