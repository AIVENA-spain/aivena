name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# NOTE: The Vitest test step is intentionally not run in CI right now.
# Reason: npm 11's Arborist dedupe crashes on Linux when resolving packages
# with many platform-specific optional native dependencies (Rolldown, Rollup,
# etc). This is a known npm bug, not an AIVENA bug. Until npm fixes it or we
# move to pnpm, the RLS Vitest suite runs locally with:
#   APP_PW='...' npm test
# CI here covers TypeScript correctness only. Re-enable vitest run below
# when the upstream npm issue is resolved.

jobs:
  test:
    name: TypeScript check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (no emit)
        run: npx tsc --noEmit
