<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- Template 31 "La Entrada" — CC-authored 2-photo design #2 (2026-07-15). Dark botanical luxury:
       the exterior seen through a Mediterranean ARCH, the interior as a porthole circle overlapping it.
       All text engine-drawn (no_knockouts). -->
  <defs>
    <clipPath id="arch"><path d="M 210 450 A 330 330 0 0 1 870 450 L 870 880 L 210 880 Z"/></clipPath>
    <clipPath id="porthole"><circle cx="845" cy="795" r="145"/></clipPath>
  </defs>
  <rect x="0" y="0" width="1080" height="1350" fill="#16241d"/>
  <!-- echo outline of the arch — a drawn doorway around the doorway -->
  <path d="M 192 450 A 348 348 0 0 1 888 450 L 888 898 L 192 898 Z" fill="none" stroke="#eae3d3" stroke-width="1.5" stroke-opacity="0.35"/>
  <g clip-path="url(#arch)">
    <image x="210" y="120" width="660" height="760" xlink:href="@@PHOTO0@@" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <!-- porthole: ground-colour gap ring, then a thin terracotta ring, then the interior -->
  <circle cx="845" cy="795" r="158" fill="#16241d"/>
  <circle cx="845" cy="795" r="152" fill="none" stroke="#c4644a" stroke-width="2"/>
  <g clip-path="url(#porthole)">
    <image x="700" y="650" width="290" height="290" xlink:href="@@PHOTO1@@" preserveAspectRatio="xMidYMid slice"/>
  </g>
</svg>
