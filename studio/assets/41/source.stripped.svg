<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- Template 41 "Luna" - CC-authored 1-photo (2026-07-15), night sibling of Brisa. Photo bleeds off the
       LEFT edge; a line moon rises behind its right corner; dashed currents cross onto the photo; a
       constellation lives in the corner. Ground engine-painted (dark). All text engine-drawn. -->

  <!-- the line moon behind the photo's top-right corner, with a gold crescent heart -->
  <circle cx="936" cy="168" r="44" fill="none" stroke="#efe9db" stroke-width="2"/><circle cx="936" cy="168" r="76" fill="none" stroke="#efe9db" stroke-width="2"/><circle cx="936" cy="168" r="108" fill="none" stroke="#efe9db" stroke-width="2"/><circle cx="936" cy="168" r="140" fill="none" stroke="#efe9db" stroke-width="2"/><circle cx="936" cy="168" r="172" fill="none" stroke="#efe9db" stroke-width="2"/>
  <path d="M 936 138 A 30 30 0 1 1 936 198 A 24 24 0 1 0 936 138 Z" fill="#c8a24b"/>

  <!-- four-point line stars in the sky corner -->
