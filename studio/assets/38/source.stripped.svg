<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- Template 38 "El Chiringuito" — CC-authored 1-photo (2026-07-15), sibling of La Ventana.
       THE IDEA: the property as the view from a beach-bar shopfront — striped scalloped awning, bamboo
       poles, bunting across the opening, palm fronds leaning in, waves and shells at the sand line,
       and a cat strolling the beach. Sand is engine-painted (recolourable). All text engine-drawn. -->
