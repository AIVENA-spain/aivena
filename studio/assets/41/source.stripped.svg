  <image x="0" y="110" width="930" height="730" xlink:href="@@PHOTO0@@" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="110" width="930" height="730" fill="none" stroke="#efe9db" stroke-width="4"/>

