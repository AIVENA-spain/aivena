<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Property valuation</title>
<style>
  :root{
    --brand:#0B7C3A;
    --ink:#10131A; --soft:#5C636C; --line:rgba(16,19,26,.14); --line-soft:rgba(16,19,26,.08);
    --paper:#FFFFFF; --bg:transparent; --err:#B3261E;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:var(--bg); }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif;
    color:var(--ink); font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .card{
    background:var(--paper); border:1px solid var(--line); border-radius:16px;
    padding:22px; max-width:520px; box-shadow:0 18px 50px -30px rgba(16,19,26,.35);
  }
  .head{ display:flex; align-items:center; gap:12px; margin-bottom:6px; }
  .head img{ height:34px; width:auto; max-width:140px; object-fit:contain; }
  h1{ font-size:19px; line-height:1.25; font-weight:700; }
  .sub{ color:var(--soft); font-size:13.5px; margin-top:2px; margin-bottom:16px; }
  form{ display:flex; flex-direction:column; gap:13px; }
  .row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media (max-width:420px){ .row{ grid-template-columns:1fr; } }
  label{ display:block; font-size:12.5px; font-weight:600; margin-bottom:4px; }
  label .opt{ font-weight:400; color:var(--soft); }
  input,select{
    width:100%; min-height:42px; border:1px solid var(--line); border-radius:9px;
    padding:9px 11px; font-size:15px; font-family:inherit; color:var(--ink); background:#fff;
  }
  input:focus,select:focus{ outline:2px solid var(--brand); outline-offset:1px; border-color:var(--brand); }
  .consents{ display:flex; flex-direction:column; gap:9px; border-top:1px solid var(--line-soft); padding-top:13px; }
  .consent{ display:flex; gap:9px; align-items:flex-start; font-size:12.5px; line-height:1.45; color:var(--soft); }
  .consent input{ width:16px; min-height:16px; height:16px; margin-top:2px; flex:none; accent-color:var(--brand); }
  .note{ font-size:12px; color:var(--soft); }
  button.go{
    min-height:48px; border:0; border-radius:999px; cursor:pointer;
    background:var(--brand); color:#fff; font-size:15.5px; font-weight:700; font-family:inherit;
    transition:filter .15s;
  }
  button.go:hover{ filter:brightness(1.08); }
  button.go:disabled{ opacity:.6; cursor:default; }
  .error{
    display:none; border:1px solid rgba(179,38,30,.35); background:rgba(179,38,30,.06);
    color:var(--err); border-radius:9px; padding:9px 12px; font-size:13px;
  }
  .error.show{ display:block; }
  /* result */
  .result{ display:none; text-align:center; padding:8px 0 2px; }
  .result.show{ display:block; }
  .result .rt{ font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--brand); }
  .result .avg{ font-size:34px; font-weight:800; margin-top:8px; letter-spacing:-0.01em; }
  .result .range{ display:flex; justify-content:center; gap:26px; margin-top:10px; }
  .result .range div{ font-size:12.5px; color:var(--soft); }
  .result .range b{ display:block; font-size:16px; color:var(--ink); margin-top:1px; }
  .result .disc{ margin-top:14px; font-size:12px; color:var(--soft); border-top:1px solid var(--line-soft); padding-top:12px; }
  .result .nodata{ font-size:14.5px; line-height:1.55; color:var(--ink); max-width:380px; margin:10px auto 0; }
  .result .again{ margin-top:14px; background:transparent; border:1px solid var(--line); border-radius:999px;
    min-height:40px; padding:0 18px; font-size:13px; font-family:inherit; cursor:pointer; color:var(--ink); }
  .foot{ margin-top:14px; text-align:center; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--soft); }
  .foot a{ color:inherit; text-decoration:none; }
  .check{ width:44px; height:44px; border-radius:50%; background:var(--brand); color:#fff;
    display:flex; align-items:center; justify-content:center; margin:0 auto 4px; font-size:22px; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="head">
    <img id="logo" alt="" style="display:none" referrerpolicy="no-referrer" />
    <div>
      <h1 id="t-title"></h1>
      <div class="sub" id="t-sub"></div>
    </div>
  </div>

  <form id="f" novalidate>
    <div>
      <label for="municipality" id="l-mun"></label>
      <input id="municipality" name="municipality" required autocomplete="address-level2" />
    </div>
    <div>
      <label for="neighbourhood" id="l-nb"></label>
      <input id="neighbourhood" name="neighbourhood" />
    </div>
    <div class="row">
      <div>
        <label for="ptype" id="l-type"></label>
        <select id="ptype" name="ptype">
          <option value="apartment" id="o-ap"></option>
          <option value="villa_house" id="o-vh"></option>
          <option value="townhouse" id="o-th"></option>
          <option value="other" id="o-ot"></option>
        </select>
      </div>
      <div>
        <label for="size" id="l-size"></label>
        <input id="size" name="size" type="number" min="1" max="99999" inputmode="numeric" required />
      </div>
    </div>
    <div class="row">
      <div>
        <label for="bedrooms" id="l-bed"></label>
        <input id="bedrooms" name="bedrooms" type="number" min="0" max="50" inputmode="numeric" />
      </div>
      <div>
        <label for="condition" id="l-cond"></label>
        <select id="condition" name="condition">
          <option value="needs_renovation" id="o-c1"></option>
          <option value="fair" id="o-c2"></option>
          <option value="good" id="o-c3" selected></option>
          <option value="excellent" id="o-c4"></option>
        </select>
      </div>
    </div>
    <div>
      <label for="cname" id="l-name"></label>
      <input id="cname" name="cname" autocomplete="name" />
    </div>
    <div class="row">
      <div>
        <label for="email" id="l-email"></label>
        <input id="email" name="email" type="email" autocomplete="email" />
      </div>
      <div>
        <label for="phone" id="l-phone"></label>
        <input id="phone" name="phone" type="tel" autocomplete="tel" />
      </div>
    </div>
    <div class="note" id="t-contactNote"></div>

    <div class="consents">
      <label class="consent"><input type="checkbox" id="c-priv" /> <span id="t-consentPrivacy"></span></label>
      <label class="consent"><input type="checkbox" id="c-cont" /> <span id="t-consentContact"></span></label>
    </div>

    <div class="error" id="err" role="alert"></div>
    <button class="go" type="submit" id="go"></button>
  </form>

  <div class="result" id="res">
    <div class="check" aria-hidden="true">✓</div>
    <div class="rt" id="t-resultTitle"></div>
    <div id="res-est">
      <div class="avg" id="r-avg"></div>
      <div class="range">
        <div><span id="t-low"></span><b id="r-low"></b></div>
        <div><span id="t-high"></span><b id="r-high"></b></div>
      </div>
      <div class="disc" id="t-disclaimer"></div>
    </div>
    <div id="res-none" style="display:none">
      <p class="nodata" id="t-noData"></p>
    </div>
    <button class="again" type="button" id="again"></button>
  </div>

  <div class="foot"><a href="https://aivena.es" target="_blank" rel="noopener">Powered by AIVENA</a></div>
</div>

};
var SUPPORTED = Object.keys(L);

/* ───────────────────────── setup ───────────────────────── */
var EF_URL = "https://atminvhrybxegpdtnnpl.supabase.co/functions/v1/property-valuation";
var q = new URLSearchParams(location.search);
var agencyId = q.get("agency") || "";
var agencyName = (q.get("name") || "").slice(0, 80);
var color = q.get("color") || "";
var logo = q.get("logo") || "";

var lang = (q.get("lang") || "").toLowerCase().split("-")[0];
if (SUPPORTED.indexOf(lang) === -1) {
  var nav = (navigator.languages || [navigator.language || "en"]);
  lang = "en";
  for (var i = 0; i < nav.length; i++) {
    var c = String(nav[i]).toLowerCase().split("-")[0];
    if (c === "nb" || c === "nn") c = "no";
    if (SUPPORTED.indexOf(c) !== -1) { lang = c; break; }
  }
}
var T = L[lang];
document.documentElement.lang = lang;

if (/^#[0-9a-fA-F]{3,8}$/.test(color)) {
  document.documentElement.style.setProperty("--brand", color);
}
if (/^https:\/\//.test(logo)) {
  var img = document.getElementById("logo");
  img.src = logo;
  img.style.display = "";
  img.onerror = function(){ img.style.display = "none"; };
}

function el(id){ return document.getElementById(id); }
function setText(id, s){ el(id).textContent = s; }
var agencyLabel = agencyName || T.agency;

setText("t-title", T.title);
setText("t-sub", T.sub);
setText("l-mun", T.mun);
el("municipality").placeholder = T.munPh;
el("l-nb").innerHTML = "";
el("l-nb").appendChild(document.createTextNode(T.nb + " "));
(function(){ var o=document.createElement("span"); o.className="opt"; o.textContent=T.optional; el("l-nb").appendChild(o); })();
setText("l-type", T.type);
setText("o-ap", T.ap); setText("o-vh", T.vh); setText("o-th", T.th); setText("o-ot", T.ot);
setText("l-size", T.size);
(function(){ var l=el("l-bed"); l.textContent=T.bed+" "; var o=document.createElement("span"); o.className="opt"; o.textContent=T.optional; l.appendChild(o); })();
setText("l-cond", T.cond);
setText("o-c1", T.c1); setText("o-c2", T.c2); setText("o-c3", T.c3); setText("o-c4", T.c4);
(function(){ var l=el("l-name"); l.textContent=T.name+" "; var o=document.createElement("span"); o.className="opt"; o.textContent=T.optional; l.appendChild(o); })();
setText("l-email", T.email);
setText("l-phone", T.phone);
setText("t-contactNote", T.contactNote);
var privacyText = T.consentPrivacy;
var contactText = T.consentContact.replace("{agency}", agencyLabel);
setText("t-consentPrivacy", privacyText);
setText("t-consentContact", contactText);
setText("go", T.submit);
setText("t-resultTitle", T.resultTitle);
setText("t-low", T.low);
setText("t-high", T.high);
setText("t-disclaimer", T.disclaimer);
setText("t-noData", T.noData);
setText("again", T.again);
document.title = T.title;

/* ───────────────────────── height reporting ───────────────────────── */
function reportHeight(){
  try {
    parent.postMessage(
      { type: "aivena-valuation-height", height: document.documentElement.scrollHeight + 8 },
      "*"
    );
  } catch (e) {}
}
window.addEventListener("load", reportHeight);
window.addEventListener("resize", reportHeight);
setTimeout(reportHeight, 300);

/* ───────────────────────── submit ───────────────────────── */
var f = el("f"), err = el("err"), go = el("go");
function showErr(msg){ err.textContent = msg; err.classList.add("show"); reportHeight(); }
function clearErr(){ err.classList.remove("show"); }

var EUR = new Intl.NumberFormat(lang === "en" ? "en-IE" : lang, {
  style: "currency", currency: "EUR", maximumFractionDigits: 0
});

f.addEventListener("submit", function (ev) {
  ev.preventDefault();
  clearErr();

  var municipality = el("municipality").value.trim();
  var size = parseFloat(el("size").value);
  var email = el("email").value.trim();
  var phone = el("phone").value.trim();

  if (!municipality || !size || size <= 0) { showErr(T.errRequired); return; }
  if (!email && !phone) { showErr(T.errContact); return; }
  if (!el("c-priv").checked || !el("c-cont").checked) { showErr(T.errConsent); return; }

  var bedrooms = parseInt(el("bedrooms").value, 10);
  var body = {
    agency_id: agencyId,
    municipality: municipality,
    size_m2: size,
    contact_name: el("cname").value.trim() || null,
    contact_email: email || null,
    contact_phone: phone || null,
    neighbourhood: el("neighbourhood").value.trim() || null,
    property_type: el("ptype").value,
    bedrooms: Number.isInteger(bedrooms) ? bedrooms : null,
    condition: el("condition").value,
    preferred_language: lang,
    consent_privacy: true,
    consent_contact: true,
    consent_text: "[privacy] " + privacyText + " | [contact] " + contactText,
    source_meta: { widget: "valuation-v1", host: (function(){ try { return document.referrer ? new URL(document.referrer).hostname : null; } catch(e){ return null; } })(), lang: lang }
  };

  go.disabled = true;
  go.textContent = T.submitting;

  fetch(EF_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  })
    .then(function (r) { return r.json().then(function (d) { return { status: r.status, data: d }; }); })
    .then(function (res) {
      var d = res.data || {};
      if (!d.ok) {
        var code = d.error || "";
        var msg = code === "consent_required" ? T.errConsent
          : code === "missing_contact" ? T.errContact
          : (code === "missing_municipality" || code === "invalid_size") ? T.errRequired
          : T.errGeneric;
        showErr(msg);
        go.disabled = false;
        go.textContent = T.submit;
        return;
      }
      // success → show result
      f.style.display = "none";
      var res$ = el("res");
      res$.classList.add("show");
      if (d.found && d.estimate && d.estimate.avg != null) {
        el("r-avg").textContent = EUR.format(d.estimate.avg);
        el("r-low").textContent = d.estimate.low != null ? EUR.format(d.estimate.low) : "—";
        el("r-high").textContent = d.estimate.high != null ? EUR.format(d.estimate.high) : "—";
        el("res-est").style.display = "";
        el("res-none").style.display = "none";
      } else {
        el("res-est").style.display = "none";
        el("res-none").style.display = "";
      }
      reportHeight();
    })
    .catch(function () {
      showErr(T.errGeneric);
      go.disabled = false;
      go.textContent = T.submit;
    });
});

el("again").addEventListener("click", function () {
  el("res").classList.remove("show");
  f.style.display = "";
  go.disabled = false;
  go.textContent = T.submit;
  reportHeight();
});
})();
</script>
</body>
</html>
